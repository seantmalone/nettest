# .github/workflows/test.yml
name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
      - name: Type check
        run: |
          mypy src/nettest
      - name: Test (fast suite)
        run: |
          pytest -q -m "not slow and not wifi"
      # Slow integration tests skip Windows because they spin up local
      # subprocesses (HTTP/DNS servers, ping subprocess assertions) whose
      # shell quoting and signal semantics differ enough on Windows runners
      # that flakes outweigh signal. Windows-specific behavior is exercised
      # by unit tests at the parser level (e.g., parse_tracert_output,
      # parse_netsh_output) which DO run on the Windows matrix entry.
      - name: Slow integration tests
        if: matrix.os != 'windows-latest'
        run: |
          pytest -q -m slow
